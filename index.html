<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Car Remote</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .remote {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: grid;
      gap: 15px;
    }

    button {
      height: 70px;
      font-size: 18px;
      border: none;
      border-radius: 16px;
      background: #2a2a2a;
      color: white;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.8;
    }

    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }

    .empty {
      visibility: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }
  </style>
</head>

<body>

  <div class="remote">

    <!-- D-Pad -->
    <div class="dpad">
      <div class="empty"></div>
      <button id="forward">Forward</button>
      <div class="empty"></div>

      <button id="left">Left</button>
      <button id="stop">STOP</button>
      <button id="right">Right</button>

      <div class="empty"></div>
      <button id="back">Back</button>
      <div class="empty"></div>
    </div>

    <!-- Extra Controls -->
    <div class="row">
      <button id="honk">Honk</button>
      <button id="flash">Flash</button>
      <div></div>
    </div>

  </div>

  <script>
    function send(command) {
      console.log("Sending:", command);
      // Example:
      // fetch(`/command?move=${command}`);
    }

    // Movement (press + hold behavior)
    function holdButton(id, command) {
      const btn = document.getElementById(id);

      btn.addEventListener("pointerdown", () => send(command));
      btn.addEventListener("pointerup", () => send("stop"));
      btn.addEventListener("pointercancel", () => send("stop"));
      btn.addEventListener("pointerleave", () => send("stop"));
    }

    holdButton("forward", "forward");
    holdButton("back", "back");
    holdButton("left", "left");
    holdButton("right", "right");

    document.getElementById("stop").addEventListener("click", () => send("stop"));
    document.getElementById("honk").addEventListener("click", () => send("honk"));
    document.getElementById("flash").addEventListener("click", () => send("flash"));
  </script>

</body>
</html>
